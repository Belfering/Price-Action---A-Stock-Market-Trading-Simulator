services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_action}
      POSTGRES_USER: ${POSTGRES_USER:-price_action}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_deploy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-price_action}:${POSTGRES_PASSWORD:-change_me_before_deploy}@db:5432/${POSTGRES_DB:-price_action}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-1}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-1}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_DAYS: ${SESSION_DAYS:-30}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy

  frontend-proxy:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_action}
      POSTGRES_USER: ${POSTGRES_USER:-price_action}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_deploy}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c 'mkdir -p /backups &&
      while true; do
        PGPASSWORD="$${POSTGRES_PASSWORD}" pg_dump -h db -U "$${POSTGRES_USER}" "$${POSTGRES_DB}" |
          gzip > "/backups/profile_$$(date +%Y%m%d_%H%M%S).sql.gz";
        find /backups -type f -name "*.sql.gz" -mtime +14 -delete;
        sleep 86400;
      done'

volumes:
  postgres_data:
